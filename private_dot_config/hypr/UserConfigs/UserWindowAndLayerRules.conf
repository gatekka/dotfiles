####################################
### WINDOWS AND WORKSPACES RULES ###
####################################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

#####################
### PLUGIN CONFIG ###
#####################

plugin {
    hyprsplit {
        num_workspaces = 5 # Set 5 workspaces per monitor
        persistent_workspaces = true
    }
    hyprexpo {
        workspace_method = "center"
        columns = 3
        skip_empty = false
    }
    hyprbars {
        bar_height = 25
        bar_color = $surface_container
        bar_buttons_alignment = left
        bar_part_of_window = true
        bar_precedence_over_border = false
        col.text = $primary_fixed
        bar_title_enabled = true
        bar_text_font = "CodeNewRoman Nerd Font Propo"
        bar_blur = true
        hyprbars-button = $red, 14, , hyprctl dispatch killactive
        hyprbars-button = $yellow, 14, , hyprctl dispatch fullscreen 1
        on_double_click = hyprctl dispatch fullscreen 1
    }
}

##############################
### PROGRAM SPECIFIC RULES ###
##############################

# Gemini
windowrule {
  name = "Gemini"
  pseudo = on
  size = 750 750
  keep_aspect_ratio = on
  match:class = (gemini)
}

# MPV
windowrule {
  name = "MPV"
  match:class = (mpv)
  float = on
  size = 75%
  keep_aspect_ratio = on
}

# qView
windowrule {
  name = "qView"
  match:class = (com.interversehq.qView)
  float = on
}

# All Programs
windowrule {
  name = "All Programs"
  match:class = .*
  suppress_event = maximize # Ignore maximize requests from apps.
}

# Fix some dragging issues with XWayland
windowrule {
  name = "Fix some dragging issues with XWayland"
  match:focus = false
  match:class = ^$
  match:title = ^$
  match:xwayland = true
  match:float = true
  match:fullscreen = true
  match:pin = true
}

# On fullscreened windows
windowrule {
  name = "Fullscreened Windows"
  match:fullscreen = 1
  no_shadow = true
  border_size = 0
  rounding = 0
  no_anim = true
}

###################
### LAYER RULES ###
###################

layerrule {
  name = "Swaync Control Center"
  match:namespace = swaync-control-center
  blur = on
  ignore_alpha = 0.1
}

layerrule {
  name = "Swaync Notification Window"
  match:namespace = swaync-notification-window
  blur = on
  ignore_alpha = 0.1
}

layerrule {
  name = "Vicinae"
  match:namespace = vicinae
  blur = on
  ignore_alpha = 0.1
}

layerrule {
  name = "Waybar"
  match:namespace = waybar
  blur = on
  ignore_alpha = 0.1
}

layerrule {
  name = "Wlogout"
  match:namespace = logout_dialog
  blur = on
}

####################
### LAYOUT RULES ###
####################
# https://wiki.hypr.land/Configuring/Scrolling-Layout/

scrolling {
    focus_fit_method = 1
    column_width = 0.95
    direction = down
}

#######################
### WORKSPACE RULES ###
#######################

## When workspace has 1 visible window
workspace = w[tv1]s[false], gapsout:50, gapsin:0
workspace = w[tv1]s[true], gapsout:62.5, gapsin:0

# workspace = r[6-6]w[tv1], gapsout:300 400,
workspace = f[1], gapsout:0, gapsin:0 # When fullscreened

workspace = s[true], layout:scrolling # Scrolling layout on special workspace
workspace = 1, layout:scrolling # Scrolling layout on workspace 1

